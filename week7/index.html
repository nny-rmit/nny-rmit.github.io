<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Audio on Web</title>
  </head>
  <body>
    <h1>Learning audio embedding.</h1>
    <audio id="airport-audio" src="airport.mp3" controls></audio>
    <audio id="pop-audio" src="pop.mp3"></audio>
    <button id="play-button">play audio</button>
    <button id="pause-button">pause audio</button>
    <button id="pop-button">pop sound</button>

    <p id="msg"></p>

    <video id="my-video" src="stardust.mp4" controls></video>
    <!--play button new example-->
    <button id="play-pause-btn">
      <img
        id="play-pause-img"
        src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
        alt="Play Button"
        width="24"
        height="24"
      />
    </button>
  </body>
</html>
